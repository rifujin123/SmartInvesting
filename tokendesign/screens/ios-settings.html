<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SmartInvest — Settings</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/app-shell.css">
<style>
.ios-status-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px 8px;font-size:15px;font-weight:600;background:var(--bg);color:var(--fg)}.dynamic-island{width:126px;height:37px;border-radius:20px;background:#000;margin:0 auto;position:absolute;left:50%;transform:translateX(-50%);top:8px}.ios-home-indicator{width:134px;height:5px;border-radius:3px;background:rgba(0,0,0,.2);margin:8px auto;position:fixed;bottom:4px;left:50%;transform:translateX(-50%);z-index:200}.profile-header{padding:20px 16px;text-align:center;background:var(--bg-off);margin:16px;border-radius:var(--r-lg)}.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:var(--accent-dark);margin:0 auto 12px}.profile-name{font-size:20px;font-weight:700;margin-bottom:4px}.profile-email{font-size:14px;color:var(--muted)}.settings-group{padding:0 16px;margin-bottom:24px}.settings-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}.settings-list{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border)}.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}.settings-item:last-child{border-bottom:none}.settings-item:active{background:var(--bg-off)}.settings-item-label{font-size:15px;font-weight:500}.settings-item-value{font-size:15px;color:var(--muted)}.settings-item-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0}.version-info{text-align:center;padding:24px 16px;font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="app-shell">
  <div class="ios-status-bar"><span>9:41</span><div class="dynamic-island"></div><span style="display:flex;gap:6px;align-items:center;"><svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="5" width="3" height="7" rx="1" fill="#0e0f0c"/><rect x="5" y="3" width="3" height="9" rx="1" fill="#0e0f0c"/><rect x="10" y="1" width="3" height="11" rx="1" fill="#0e0f0c"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#0e0f0c" opacity=".3"/></svg><svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="0" width="22" height="12" rx="3" stroke="#0e0f0c" stroke-width="1" fill="none"/><rect x="2" y="2" width="16" height="8" rx="1.5" fill="#0e0f0c"/><rect x="23" y="4" width="2" height="4" rx="1" fill="#0e0f0c"/></svg></span></div>
  <div class="app-content">
    <div class="app-header"><div class="app-header-title">Settings</div><button class="btn-icon" style="background:var(--bg-off);display:flex;align-items:center;justify-content:center;" onclick="SmartInvest.navigate('screens/ios-dashboard.html')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button></div>
    <div class="profile-header"><div class="profile-avatar">M</div><div class="profile-name">Minh</div><div class="profile-email">minh@example.com</div></div>
    <div class="settings-group"><div class="settings-title">Account</div><div class="settings-list"><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:#e2f6d5;color:#163300;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div><div><div class="settings-item-label">Account ID</div><div class="settings-item-value">SMRT-2026-8149</div></div></div><button class="btn btn-sm btn-secondary" onclick="SmartInvest.copyAccountId(this)">Copy</button></div><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:rgba(56,200,255,.12);color:#0077B6;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="settings-item-label">Security</div></div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:#fde8e8;color:#d03238;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><div class="settings-item-label">Notifications</div></div><div class="toggle on" onclick="SmartInvest.toggleSwitch(this)" aria-checked="true"></div></div></div></div>
    <div class="settings-group"><div class="settings-title">Preferences</div><div class="settings-list"><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:var(--bg-off);color:var(--muted-dark);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div class="settings-item-label">Currency</div></div><div class="settings-item-value">USD</div></div><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:var(--bg-off);color:var(--muted-dark);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></div><div class="settings-item-label">Dark mode</div></div><div class="toggle" onclick="SmartInvest.toggleSwitch(this)" aria-checked="false"></div></div><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:var(--bg-off);color:var(--muted-dark);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div><div class="settings-item-label">Language</div></div><div class="settings-item-value">English</div></div></div></div>
    <div class="settings-group"><div class="settings-title">Support</div><div class="settings-list"><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:var(--bg-off);color:var(--muted-dark);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="settings-item-label">Help Center</div></div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div><div class="settings-item"><div style="display:flex;align-items:center;"><div class="settings-item-icon" style="background:var(--bg-off);color:var(--muted-dark);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4 8 4v14"/><path d="M9 10a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v11H9V10z"/></svg></div><div class="settings-item-label">About SmartInvest</div></div><div class="settings-item-value">v1.0.0</div></div></div></div>
    <div class="version-info">SmartInvest v1.0.0 · Build 2026.05.17<br>Not a bank. Investment-only platform.</div>
  </div>
  <nav class="tab-bar"><button class="tab-item" onclick="SmartInvest.navigate('screens/ios-dashboard.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</button><button class="tab-item" onclick="SmartInvest.navigate('screens/ios-discovery.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Discover</button><button class="tab-item" onclick="SmartInvest.navigate('screens/ios-history.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>History</button><button class="tab-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v10M4.2 4.2l4.2 4.2m7.2 7.2l4.2 4.2M1 12h6m10 0h6M4.2 19.8l4.2-4.2m7.2-7.2l4.2-4.2"/></svg>Settings</button></nav>
  <div class="ios-home-indicator"></div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
